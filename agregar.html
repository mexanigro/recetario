<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>הוספת מתכון — פינת המתכונים</title>
  <meta name="description" content="מוסיפים מתכון חדש לספר: שם, תמונה, מצרכים והוראות הכנה.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🍳</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400..900&family=Assistant:wght@400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="cabecera">
    <div class="contenedor cabecera-inner">
      <a class="marca" href="index.html"><span data-i18n="brand">פינת המתכונים</span><span class="punto">.</span></a>
      <nav class="nav-links" aria-label="ניווט ראשי">
        <button class="chip" id="lang-toggle" type="button">English</button>
        <a href="index.html" data-i18n="back_home">→ חזרה למתכונים</a>
      </nav>
    </div>
  </header>

  <main class="contenedor pagina-form">

    <div id="zona-form">
      <div class="form-encabezado">
        <h1 data-i18n="add_title">כותבים מתכון חדש</h1>
        <p data-i18n="add_sub">פרטו כל שלב, גם מה שנראה מובן מאליו — כמויות, זמנים, גודל חיתוך. מתכון מפורט מצליח גם בפעם הראשונה.</p>
      </div>

      <div class="form-layout">
        <form class="formulario" id="formulario" novalidate>

          <div class="campo" id="campo-nombre">
            <label for="nombre" data-i18n="lbl_name">שם המתכון</label>
            <input type="text" id="nombre" name="nombre" maxlength="120" required
                   data-i18n-ph="ph_name" placeholder="שניצל אפוי עם פירה" autocomplete="off">
            <p class="error" data-i18n="err_name">תנו למתכון שם.</p>
          </div>

          <div class="fila-campos">
            <div class="campo">
              <label for="categoria" data-i18n="lbl_cat">קטגוריה</label>
              <select id="categoria" name="categoria"></select>
            </div>
            <div class="campo">
              <label for="tiempo" data-i18n="lbl_time">זמן (בדקות)</label>
              <input type="number" id="tiempo" name="tiempo" min="1" max="999" inputmode="numeric" placeholder="45">
            </div>
            <div class="campo">
              <label for="porciones" data-i18n="lbl_servings">מנות</label>
              <input type="number" id="porciones" name="porciones" min="1" max="99" inputmode="numeric" placeholder="4">
            </div>
          </div>

          <div class="campo">
            <label for="dificultad" data-i18n="lbl_diff">דרגת קושי</label>
            <select id="dificultad" name="dificultad"></select>
          </div>

          <div class="campo">
            <label for="imagen"><span data-i18n="lbl_img">תמונה של המנה</span> <span class="opcional" data-i18n="optional">(קישור לתמונה, לא חובה)</span></label>
            <input type="url" id="imagen" name="imagen" placeholder="https://…" autocomplete="off" dir="ltr">
            <p class="ayuda" data-i18n-html="help_img_html"></p>
          </div>

          <div class="campo">
            <label for="descripcion"><span data-i18n="lbl_desc">תיאור קצר</span> <span class="opcional" data-i18n="optional_short">(לא חובה)</span></label>
            <input type="text" id="descripcion" name="descripcion" maxlength="200"
                   data-i18n-ph="ph_desc" placeholder="הקלאסיקה של ארוחת שישי" autocomplete="off">
          </div>

          <div class="campo" id="campo-ingredientes">
            <label for="ingredientes"><span data-i18n="lbl_ing">מצרכים</span> <span class="opcional" data-i18n="per_line">(אחד בכל שורה)</span></label>
            <textarea id="ingredientes" name="ingredientes" required data-i18n-ph="ph_ing"></textarea>
            <p class="error" data-i18n="err_ing">רשמו לפחות מצרך אחד.</p>
          </div>

          <div class="campo" id="campo-pasos">
            <label for="pasos"><span data-i18n="lbl_steps">הוראות הכנה</span> <span class="opcional" data-i18n="per_line">(אחד בכל שורה)</span></label>
            <textarea id="pasos" name="pasos" required data-i18n-ph="ph_steps"></textarea>
            <p class="error" data-i18n="err_steps">ספרו לפחות שלב אחד.</p>
          </div>

          <div>
            <button class="boton" type="submit" id="btn-guardar" data-i18n="submit">לשמור בפינת המתכונים</button>
          </div>
        </form>

        <aside class="form-vista-previa" aria-hidden="true">
          <p class="vista-previa-titulo" data-i18n="preview_title">ככה זה ייראה</p>
          <div id="vista-previa"></div>
        </aside>
      </div>
    </div>

    <!-- מסך הצלחה -->
    <div class="exito" id="zona-exito" hidden>
      <div class="sello" aria-hidden="true">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      </div>
      <h2 data-i18n="success_title">נשמר!</h2>
      <p id="exito-detalle"></p>
      <div class="acciones">
        <a class="boton" href="index.html" data-i18n="success_view">לעיין במתכונים</a>
        <button class="boton boton-secundario" id="btn-otra" type="button" data-i18n="success_again">להוסיף עוד מתכון</button>
      </div>
    </div>

  </main>

  <script type="module">
    import { guardarReceta, cartaReceta } from "./js/app.js";
    import { TEXTOS, getLang, t, aplicarIdioma, conectarToggle } from "./js/i18n.js";

    const form = document.getElementById("formulario");
    const vistaPrevia = document.getElementById("vista-previa");
    const btnGuardar = document.getElementById("btn-guardar");
    const selCategoria = document.getElementById("categoria");
    const selDificultad = document.getElementById("dificultad");

    const lineas = (texto) => texto.split("\n").map((l) => l.trim()).filter(Boolean);

    // Los selects usan claves estables; las etiquetas cambian con el idioma.
    function pintarSelects() {
      const lang = getLang();
      const catActual = selCategoria.value;
      const difActual = selDificultad.value;
      selCategoria.innerHTML = Object.entries(TEXTOS[lang].cats)
        .map(([clave, nombre]) => `<option value="${clave}">${nombre}</option>`).join("");
      selDificultad.innerHTML = Object.entries(TEXTOS[lang].diffs)
        .map(([clave, nombre]) => `<option value="${clave}">${nombre}</option>`).join("");
      if (catActual) selCategoria.value = catActual;
      if (difActual) selDificultad.value = difActual;
    }

    function leerFormulario() {
      return {
        nombre: form.nombre.value.trim(),
        categoria: selCategoria.value,
        tiempo: Number(form.tiempo.value) || null,
        porciones: Number(form.porciones.value) || null,
        dificultad: selDificultad.value,
        imagen: form.imagen.value.trim() || null,
        descripcion: form.descripcion.value.trim() || null,
        ingredientes: lineas(form.ingredientes.value),
        pasos: lineas(form.pasos.value),
        idioma: getLang(), // en qué idioma se escribió
      };
    }

    function actualizarVistaPrevia() {
      const r = leerFormulario();
      vistaPrevia.innerHTML = cartaReceta({
        ...r,
        id: "vista-previa",
        nombre: r.nombre || t("preview_name"),
      });
      vistaPrevia.querySelector("a")?.addEventListener("click", (e) => e.preventDefault());
    }

    form.addEventListener("input", actualizarVistaPrevia);

    function validar(r) {
      let ok = true;
      const marcar = (id, invalido) => {
        document.getElementById(id).classList.toggle("invalido", invalido);
        if (invalido) ok = false;
      };
      marcar("campo-nombre", !r.nombre);
      marcar("campo-ingredientes", !r.ingredientes.length);
      marcar("campo-pasos", !r.pasos.length);
      if (!ok) document.querySelector(".campo.invalido input, .campo.invalido textarea")?.focus();
      return ok;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const r = leerFormulario();
      if (!validar(r)) return;

      btnGuardar.disabled = true;
      btnGuardar.textContent = t("saving");
      try {
        await guardarReceta(r);
        document.getElementById("zona-form").hidden = true;
        document.getElementById("exito-detalle").textContent = t("success_sub", r.nombre);
        document.getElementById("zona-exito").hidden = false;
        window.scrollTo({ top: 0 });
      } catch (err) {
        console.error("Error al guardar:", err);
        btnGuardar.disabled = false;
        btnGuardar.textContent = t("submit");
        alert(t("save_error"));
      }
    });

    document.getElementById("btn-otra").addEventListener("click", () => {
      form.reset();
      actualizarVistaPrevia();
      document.getElementById("zona-exito").hidden = true;
      document.getElementById("zona-form").hidden = false;
      btnGuardar.disabled = false;
      btnGuardar.textContent = t("submit");
      form.nombre.focus();
    });

    function pintarTodo() {
      document.title = t("title_add");
      pintarSelects();
      actualizarVistaPrevia();
    }

    aplicarIdioma();
    conectarToggle(pintarTodo);
    pintarTodo();
  </script>
</body>
</html>
