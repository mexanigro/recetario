<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>מתכון — פינת המתכונים</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🍳</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400..900&family=Assistant:wght@400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="cabecera">
    <div class="contenedor cabecera-inner">
      <a class="marca" href="index.html"><span data-i18n="brand">פינת המתכונים</span><span class="punto">.</span></a>
      <nav class="nav-links" aria-label="ניווט ראשי" data-i18n-aria="nav_aria">
        <button class="chip" id="lang-toggle" type="button">English</button>
        <a href="index.html" data-i18n="back_home">→ חזרה למתכונים</a>
        <a class="boton solo-desktop" href="agregar.html" data-i18n="nav_add">+ הוספת מתכון</a>
      </nav>
    </div>
  </header>

  <main id="contenido" class="contenedor">
    <div class="cargando" data-i18n="loading_recipe">מחפשים את המתכון…</div>
  </main>

  <footer class="contenedor pie">
    <span data-i18n="footer_tag">פינת המתכונים — לומדים לבשל, צעד אחרי צעד.</span>
    <a href="agregar.html" data-i18n="footer_add">הוסיפו מתכון</a>
  </footer>

  <script type="module">
    import { traerReceta, eliminarReceta, loc, etiquetaCategoria, etiquetaDificultad, linkVideo, IMAGEN_FALLBACK, esc } from "./js/app.js";
    import { getLang, t, aplicarIdioma, conectarToggle } from "./js/i18n.js";

    const contenido = document.getElementById("contenido");
    const id = new URLSearchParams(location.search).get("id");
    let receta = null;

    function pintar() {
      if (!receta) {
        contenido.innerHTML = `<div class="no-encontrada">${t("notfound_html")}</div>`;
        return;
      }
      const lang = getLang();
      const v = loc(receta, lang);
      document.title = `${v.nombre} — ${t("brand")}`;
      contenido.innerHTML = `
        <article>
          <section class="receta-hero">
            <img class="receta-hero-img" src="${esc(v.imagen || IMAGEN_FALLBACK)}"
                 alt="${esc(v.nombre)}" onerror="this.src='${IMAGEN_FALLBACK}'">
            <div>
              <span class="etiqueta">${esc(etiquetaCategoria(receta, lang))}${receta.ejemplo ? ` · ${t("example")}` : ""}</span>
              <h1>${esc(v.nombre)}</h1>
              ${v.descripcion ? `<p class="descripcion">${esc(v.descripcion)}</p>` : ""}
              <dl class="receta-datos">
                <div><dt>${t("dt_time")}</dt><dd>${esc(String(v.tiempo || "—"))} ${t("min")}</dd></div>
                <div><dt>${t("dt_servings")}</dt><dd>${esc(String(v.porciones || "—"))}</dd></div>
                <div><dt>${t("dt_diff")}</dt><dd>${esc(etiquetaDificultad(receta, lang))}</dd></div>
              </dl>
              <div class="receta-acciones">
                <a class="boton boton-secundario" href="agregar.html?editar=${encodeURIComponent(receta.id)}">${t("edit_btn")}</a>
                <a class="boton boton-secundario" href="${linkVideo(receta, lang)}" target="_blank" rel="noopener">${t(receta.video ? "video_btn_custom" : "video_btn")}</a>
                ${receta.fuente ? `<p class="receta-fuente">${t("source_label")} <a href="${esc(receta.fuente.url)}" target="_blank" rel="noopener">${esc(receta.fuente.nombre)}</a></p>` : ""}
              </div>
            </div>
          </section>

          <section class="receta-cuerpo">
            <div class="ingredientes">
              <h2>${t("ingredients")}</h2>
              <ul>
                ${(v.ingredientes || []).map((ing) => `
                  <li>
                    <label>
                      <input type="checkbox">
                      <span>${esc(ing)}</span>
                    </label>
                  </li>`).join("")}
              </ul>
              <p class="nota">${t("tick_note")}</p>
            </div>

            <div>
              <h2>${t("steps")}</h2>
              <ol class="pasos">
                ${(v.pasos || []).map((p) => `<li><p>${esc(p)}</p></li>`).join("")}
              </ol>
              ${v.tip ? `
              <aside class="receta-tip">
                <p class="tip-label">${t("tip_label")}</p>
                <p>${esc(v.tip)}</p>
              </aside>` : ""}
            </div>
          </section>

          <section class="zona-peligro">
            <button class="boton-peligro" id="btn-borrar" type="button">${t("delete_btn")}</button>
            <div class="confirmar-borrado" id="confirmar-borrado" hidden>
              <p>${t("delete_prompt")}</p>
              <p class="palabra-clave"><code>${t("delete_word")}</code></p>
              <input type="text" id="input-borrar" autocomplete="off" dir="auto">
              <div class="acciones-borrado">
                <button class="boton boton-peligro-lleno" id="btn-borrar-confirmar" type="button" disabled>${t("delete_confirm")}</button>
                <button class="boton boton-secundario" id="btn-borrar-cancelar" type="button">${t("delete_cancel")}</button>
              </div>
            </div>
          </section>
        </article>`;

      conectarBorrado();
    }

    function conectarBorrado() {
      const btn = document.getElementById("btn-borrar");
      if (!btn) return;
      const zona = document.getElementById("confirmar-borrado");
      const input = document.getElementById("input-borrar");
      const confirmar = document.getElementById("btn-borrar-confirmar");

      btn.addEventListener("click", () => {
        zona.hidden = false;
        btn.hidden = true;
        input.focus();
      });

      document.getElementById("btn-borrar-cancelar").addEventListener("click", () => {
        zona.hidden = true;
        btn.hidden = false;
        input.value = "";
        confirmar.disabled = true;
      });

      // solo se habilita si la palabra coincide exactamente
      input.addEventListener("input", () => {
        confirmar.disabled = input.value.trim() !== t("delete_word");
      });

      confirmar.addEventListener("click", async () => {
        confirmar.disabled = true;
        try {
          await eliminarReceta(receta.id);
          location.href = "index.html";
        } catch (err) {
          console.error("No se pudo eliminar:", err);
          confirmar.disabled = false;
          alert(t("delete_error"));
        }
      });
    }

    aplicarIdioma();
    conectarToggle(pintar);

    if (id) receta = await traerReceta(id);
    pintar();
  </script>
</body>
</html>
