<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&family=Assistant:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  .card {
    position: relative;
    width: 1200px;
    height: 630px;
    background: #1a1310 url('fondo.jpg') center/cover no-repeat;
    font-family: "Assistant", sans-serif;
  }
  /* velo cálido para legibilidad, más denso a la derecha (inicio RTL) */
  .velo {
    position: absolute; inset: 0;
    background:
      linear-gradient(255deg, rgba(20,12,8,0.92) 20%, rgba(20,12,8,0.55) 55%, rgba(20,12,8,0.15) 100%),
      linear-gradient(0deg, rgba(20,12,8,0.75) 0%, rgba(20,12,8,0) 45%);
  }
  .contenido {
    position: absolute;
    inset: 0;
    padding: 82px 90px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    text-align: right;
  }
  .kicker {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    color: #f2c9b3;
    font-size: 30px;
    font-weight: 600;
    letter-spacing: 0.02em;
    margin-bottom: 26px;
  }
  .kicker .punto {
    width: 14px; height: 14px; border-radius: 50%;
    background: #d9663f;
    display: inline-block;
  }
  h1 {
    font-family: "Frank Ruhl Libre", serif;
    font-weight: 900;
    font-size: 118px;
    line-height: 1.02;
    color: #fdf6ee;
    margin-bottom: 30px;
    text-shadow: 0 2px 30px rgba(0,0,0,0.4);
  }
  .sub {
    font-family: "Frank Ruhl Libre", serif;
    font-weight: 500;
    font-size: 42px;
    color: #f0e3d4;
    line-height: 1.35;
    max-width: 780px;
    margin-bottom: 44px;
  }
  .sub em { font-style: italic; color: #f2c9b3; }
  .url {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    background: #d9663f;
    color: #fff;
    font-family: "Assistant", sans-serif;
    font-weight: 600;
    font-size: 30px;
    padding: 16px 34px;
    border-radius: 999px;
    direction: ltr;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="velo"></div>
    <div class="contenido">
      <div class="kicker"><span class="punto"></span>הספוט שלי למתכונים</div>
      <h1>פינת המתכונים</h1>
      <p class="sub">לומדים לבשל <em>מהבסיס</em> — כל מתכון, צעד אחרי צעד.</p>
      <div class="url">🍳 recipespot.arzac.studio</div>
    </div>
  </div>
</body>
</html>
