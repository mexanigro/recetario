<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>פינת המתכונים — לומדים לבשל מהבסיס</title>
  <meta name="description" content="הספוט שלי למתכונים: כל מתכון כתוב מהצעד הראשון, עם כמויות מדויקות וכל הפרטים הקטנים — וקצת השראה לימים שאין רעיון.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🍳</text></svg>">
  <!-- Open Graph / redes sociales (hebreo) -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="פינת המתכונים">
  <meta property="og:locale" content="he_IL">
  <meta property="og:title" content="פינת המתכונים — לומדים לבשל מהבסיס">
  <meta property="og:description" content="הספוט שלי למתכונים: כל מתכון כתוב מהצעד הראשון, עם כמויות מדויקות, זמנים וכל הפרטים הקטנים.">
  <meta property="og:url" content="https://recipespot.arzac.studio/">
  <meta property="og:image" content="https://recipespot.arzac.studio/og/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="פינת המתכונים — לומדים לבשל מהבסיס">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="פינת המתכונים — לומדים לבשל מהבסיס">
  <meta name="twitter:description" content="כל מתכון כתוב מהצעד הראשון, עם כמויות מדויקות וכל הפרטים הקטנים.">
  <meta name="twitter:image" content="https://recipespot.arzac.studio/og/og-image.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400..900&family=Assistant:wght@400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="cabecera">
    <div class="contenedor cabecera-inner">
      <a class="marca" href="index.html"><span data-i18n="brand">פינת המתכונים</span><span class="punto">.</span></a>
      <nav class="nav-links" aria-label="ניווט ראשי" data-i18n-aria="nav_aria">
        <a class="solo-desktop" href="#recetas" data-i18n="nav_recipes">מתכונים</a>
        <a class="solo-desktop" href="#inspiracion" data-i18n="nav_inspiration">השראה</a>
        <button class="chip" id="lang-toggle" type="button">English</button>
        <a class="boton" href="agregar.html" data-i18n="nav_add">+ הוספת מתכון</a>
      </nav>
    </div>
  </header>

  <main>
    <!-- Hero: panel personal sobre foto de comida — saludo, receta del día y notas -->
    <section class="hero-bg">
      <div class="contenedor hero">
        <p class="hero-kicker" id="saludo">בוקר טוב ☀️</p>
        <h1 data-i18n="hero_pregunta">מה מבשלים היום?</h1>

        <div class="panel">
          <a class="panel-carta diaria" id="diaria" href="#recetas">
            <p class="panel-label" data-i18n="daily_label">המתכון של היום</p>
            <div class="diaria-cuerpo" id="diaria-cuerpo"></div>
          </a>

          <div class="panel-carta notas">
            <p class="panel-label"><span data-i18n="notes_label">פתקים ורשימת קניות</span> <span class="notas-guardado" id="notas-guardado" data-i18n="notes_saved">נשמר ✓</span></p>
            <textarea id="notas" data-i18n-ph="notes_ph" placeholder="חלב, ביצים, קמח… או כל תזכורת. נשמר אוטומטית במכשיר הזה."></textarea>
          </div>
        </div>
      </div>
    </section>

    <!-- מתכונים -->
    <section id="recetas" class="contenedor seccion">
      <div class="seccion-titulo">
        <h2 data-i18n="sec_recipes">המתכונים</h2>
        <span class="linea" aria-hidden="true"></span>
        <span class="contador" id="contador-recetas"></span>
      </div>

      <div class="filtros" id="filtros" role="group" aria-label="סינון לפי קטגוריה"></div>

      <div class="grilla" id="grilla">
        <div class="cargando" data-i18n="loading_pantry">מחטטים במזווה…</div>
      </div>
    </section>

    <!-- השראה -->
    <section id="inspiracion" class="inspiracion seccion">
      <div class="contenedor">
        <div class="seccion-titulo">
          <h2 data-i18n="sec_inspiration">מקורות השראה</h2>
          <span class="linea" aria-hidden="true"></span>
        </div>
        <ul class="inspiracion-lista" id="inspiracion-lista"></ul>
      </div>
    </section>
  </main>

  <footer class="contenedor pie">
    <span data-i18n="footer_tag">פינת המתכונים — לומדים לבשל, צעד אחרי צעד.</span>
    <a href="agregar.html" data-i18n="footer_add">הוסיפו מתכון</a>
  </footer>

  <script type="module">
    import { traerRecetas, cartaReceta, etiquetaCategoria, esc, loc, IMAGEN_FALLBACK, horaIsrael, diaIsrael } from "./js/app.js";
    import { TEXTOS, getLang, t, aplicarIdioma, conectarToggle } from "./js/i18n.js";

    const grilla = document.getElementById("grilla");
    const filtros = document.getElementById("filtros");
    const contador = document.getElementById("contador-recetas");
    const listaInsp = document.getElementById("inspiracion-lista");

    // Sitios de inspiración: hebreos primero (requisito del sitio).
    const INSPIRACION_URLS = [
      "https://food.walla.co.il",
      "https://www.mako.co.il/food",
      "https://www.ynet.co.il/food",
      "https://bazekalim.com",
      "https://oogio.net",
      "https://www.youtube.com/results?search_query=" + encodeURIComponent("מתכונים בעברית"),
    ];

    let recetas = [];
    let categoriaActiva = "__todas__";

    function pintar() {
      const lang = getLang();
      const visibles = categoriaActiva === "__todas__"
        ? recetas
        : recetas.filter((r) => r.categoria === categoriaActiva);

      contador.textContent = t("counter", visibles.length);

      if (!visibles.length) {
        grilla.innerHTML = `
          <div class="vacio">
            <div class="icono">${t("empty_icon")}</div>
            <p>${t("empty_html")}</p>
          </div>`;
        return;
      }
      grilla.innerHTML = visibles.map((r) => cartaReceta(r, lang)).join("");
    }

    function pintarFiltros() {
      const lang = getLang();
      const claves = [...new Set(recetas.map((r) => r.categoria).filter(Boolean))];
      const chips = [
        { clave: "__todas__", nombre: t("filter_all") },
        ...claves.map((c) => ({ clave: c, nombre: TEXTOS[lang].cats[c] || c })),
      ];
      filtros.innerHTML = chips.map((c) =>
        `<button class="chip" aria-pressed="${c.clave === categoriaActiva}" data-cat="${esc(c.clave)}">${esc(c.nombre)}</button>`
      ).join("");
    }

    function pintarInspiracion() {
      const items = TEXTOS[getLang()].insp;
      listaInsp.innerHTML = items.map((item, i) => `
        <li>
          <a href="${INSPIRACION_URLS[i]}" target="_blank" rel="noopener">
            <span class="inspiracion-num">0${i + 1}</span>
            <span class="inspiracion-nombre">${esc(item.name)}</span>
            <span class="inspiracion-flecha" aria-hidden="true">${getLang() === "he" ? "←" : "→"}</span>
            <p class="inspiracion-desc">${esc(item.desc)}</p>
          </a>
        </li>`).join("");
    }

    filtros.addEventListener("click", (e) => {
      const chip = e.target.closest(".chip");
      if (!chip) return;
      categoriaActiva = chip.dataset.cat;
      pintarFiltros();
      pintar();
    });

    // ---------- panel personal ----------

    // saludo según la hora del día en Israel
    function pintarSaludo() {
      const h = horaIsrael();
      const clave = h >= 5 && h < 12 ? "saludo_manana"
                  : h >= 12 && h < 17 ? "saludo_mediodia"
                  : h >= 17 && h < 22 ? "saludo_tarde"
                  : "saludo_noche";
      document.getElementById("saludo").textContent = t(clave);
    }

    // receta del día: rota una vez por día (día israelí), determinística
    function pintarDiaria() {
      const cuerpo = document.getElementById("diaria-cuerpo");
      if (!recetas.length) { cuerpo.innerHTML = ""; return; }
      const r = recetas[diaIsrael() % recetas.length];
      const lang = getLang();
      const v = loc(r, lang);
      const d = TEXTOS[lang];
      document.getElementById("diaria").href = `receta.html?id=${encodeURIComponent(r.id)}`;
      cuerpo.innerHTML = `
        <img src="${esc(v.imagen || IMAGEN_FALLBACK)}" alt="" onerror="this.src='${IMAGEN_FALLBACK}'">
        <div>
          <h3>${esc(v.nombre)}</h3>
          <p class="diaria-meta">${esc(etiquetaCategoria(r, lang))} · ${esc(String(v.tiempo || "—"))} ${esc(d.min)} · ${esc(String(v.porciones || "—"))} ${esc(d.servings_short)}</p>
          <p class="diaria-link">${t("daily_cta")}</p>
        </div>`;
    }

    // notas con autoguardado en el dispositivo
    const notas = document.getElementById("notas");
    const notasGuardado = document.getElementById("notas-guardado");
    let notasTimer = null;
    notas.value = localStorage.getItem("recetario-notas") || "";
    notas.addEventListener("input", () => {
      localStorage.setItem("recetario-notas", notas.value);
      notasGuardado.classList.add("visible");
      clearTimeout(notasTimer);
      notasTimer = setTimeout(() => notasGuardado.classList.remove("visible"), 1500);
    });

    function pintarTodo() {
      document.title = t("title_index");
      pintarSaludo();
      pintarDiaria();
      pintarFiltros();
      pintar();
      pintarInspiracion();
    }

    aplicarIdioma();
    conectarToggle(pintarTodo);
    pintarSaludo();

    recetas = await traerRecetas();
    pintarTodo();
  </script>
</body>
</html>
